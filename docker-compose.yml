version: '3.9'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: voxgrade-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: voxgrade
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # NestJS Backend API
  backend-nestjs:
    build:
      context: ./backend_nestjs
      dockerfile: Dockerfile
    container_name: voxgrade-nestjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:password@db:3306/voxgrade
      JWT_SECRET: voxgrade-super-secret-jwt-key-2024
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://backend-ai:8000
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # Python FastAPI AI Server
  backend-ai:
    build:
      context: ./backend_api
      dockerfile: Dockerfile
    container_name: voxgrade-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend_api/models:/api/models:ro

  # Vue.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voxgrade-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend-nestjs

volumes:
  mysql_data:
  uploads_data:
